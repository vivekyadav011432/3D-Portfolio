/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   NARUTO 9-TAILS SEAL TEXTURE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function buildSealTexture() {
  const S=1024,cx=S/2,cy=S/2;
  const cv=document.createElement("canvas"); cv.width=cv.height=S;
  const c=cv.getContext("2d");
  c.fillStyle="#090003"; c.fillRect(0,0,S,S);
  const bg=c.createRadialGradient(cx,cy,0,cx,cy,S*0.5);
  bg.addColorStop(0,"rgba(200,40,0,0.22)"); bg.addColorStop(0.55,"rgba(90,6,0,0.12)"); bg.addColorStop(1,"transparent");
  c.fillStyle=bg; c.fillRect(0,0,S,S);
  for(let i=0;i<9;i++){c.beginPath();c.arc(cx,cy,52+i*50,0,Math.PI*2);c.strokeStyle=`rgba(255,${44+i*20},0,${0.58-i*0.044})`;c.lineWidth=i<2?3.5:1.6;c.stroke();}
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;c.beginPath();c.moveTo(cx+Math.cos(a)*52,cy+Math.sin(a)*52);c.lineTo(cx+Math.cos(a)*460,cy+Math.sin(a)*460);c.strokeStyle="rgba(255,55,0,0.22)";c.lineWidth=1;c.stroke();}
  for(let ring=0;ring<8;ring++){const r=52+ring*50;for(let i=0;i<72;i++){const a=(i/72)*Math.PI*2;c.beginPath();c.moveTo(cx+Math.cos(a)*(r-8),cy+Math.sin(a)*(r-8));c.lineTo(cx+Math.cos(a)*(r+8),cy+Math.sin(a)*(r+8));c.strokeStyle=`rgba(255,70,0,${i%6===0?0.42:0.11})`;c.lineWidth=i%6===0?1.6:0.7;c.stroke();}}
  c.save(); c.translate(cx,cy);
  for(let r=-5;r<=5;r++){const a=0.11-Math.abs(r)*0.008;c.beginPath();c.moveTo(-190,r*26);c.lineTo(190,r*26);c.strokeStyle=`rgba(255,50,0,${a})`;c.lineWidth=0.7;c.stroke();c.beginPath();c.moveTo(r*26,-190);c.lineTo(r*26,190);c.strokeStyle=`rgba(255,50,0,${a})`;c.lineWidth=0.7;c.stroke();}
  c.restore();
  for(let t=0;t<2;t++){c.beginPath();for(let j=0;j<4;j++){const a=t*(Math.PI/3)+(j/3)*Math.PI*2-Math.PI/2;j===0?c.moveTo(cx+Math.cos(a)*148,cy+Math.sin(a)*148):c.lineTo(cx+Math.cos(a)*148,cy+Math.sin(a)*148);}c.closePath();c.strokeStyle="rgba(255,68,0,0.40)";c.lineWidth=1.8;c.stroke();}
  c.beginPath();for(let t=0.14;t<Math.PI*5.6;t+=0.038){const r=t*7.8,x=cx+Math.cos(t)*r,y=cy+Math.sin(t)*r;t<0.18?c.moveTo(x,y):c.lineTo(x,y);}c.strokeStyle="rgba(255,148,0,0.92)";c.lineWidth=3.0;c.stroke();
  c.beginPath();for(let t=0.14;t<Math.PI*4.2;t+=0.048){const r=t*9.5,x=cx+Math.cos(-t+Math.PI)*r,y=cy+Math.sin(-t+Math.PI)*r;t<0.18?c.moveTo(x,y):c.lineTo(x,y);}c.strokeStyle="rgba(255,55,0,0.54)";c.lineWidth=2.0;c.stroke();
  c.textAlign="center";c.textBaseline="middle";
  "封印九尾禁術陰陽空無天地".split("").forEach((k,i)=>{const a=(i/12)*Math.PI*2-Math.PI/2;c.save();c.translate(cx+Math.cos(a)*318,cy+Math.sin(a)*318);c.rotate(a+Math.PI/2);c.font="bold 32px serif";c.fillStyle=`rgba(255,${88+i*8},0,0.74)`;c.fillText(k,0,0);c.restore();});
  "封禁解術".split("").forEach((k,i)=>{const a=(i/4)*Math.PI*2-Math.PI/4;c.save();c.translate(cx+Math.cos(a)*195,cy+Math.sin(a)*195);c.font="bold 42px serif";c.fillStyle="rgba(255,148,0,0.86)";c.fillText(k,0,0);c.restore();});
  for(let ring=0;ring<8;ring++){const r=52+ring*50;for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;c.beginPath();c.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,ring<2?3.8:2.3,0,Math.PI*2);c.fillStyle=`rgba(255,${72+ring*18},0,0.77)`;c.fill();}}
  c.font="bold 82px serif";c.fillStyle="rgba(255,198,0,0.97)";c.fillText("九",cx,cy-30);
  c.font="bold 48px serif";c.fillStyle="rgba(255,95,0,0.94)";c.fillText("尾",cx,cy+44);
  return new THREE.CanvasTexture(cv);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MINI FLOAT-3D  (hero HUD)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function MiniFloat3D() {
  const ref = useRef();
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const W=el.clientWidth, H=el.clientHeight;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(W,H); el.appendChild(renderer.domElement);
    const scene=new THREE.Scene(), camera=new THREE.PerspectiveCamera(60,W/H,0.1,100);
    camera.position.set(0,0,3.2);
    scene.add(new THREE.AmbientLight(0xffffff,0.3));
    const d1=new THREE.DirectionalLight(0x7b2fff,5); d1.position.set(2,3,2); scene.add(d1);
    const d2=new THREE.DirectionalLight(0x00c3ff,4); d2.position.set(-2,-1,2); scene.add(d2);
    const d3=new THREE.PointLight(0xff00cc,3,10); d3.position.set(0,2,1); scene.add(d3);
    const core=new THREE.Mesh(new THREE.IcosahedronGeometry(0.85,1),new THREE.MeshStandardMaterial({color:0x7b2fff,metalness:0.8,roughness:0.15,emissive:0x220066,emissiveIntensity:0.5})); scene.add(core);
    scene.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.91,1),new THREE.MeshBasicMaterial({color:0x00c3ff,wireframe:true,transparent:true,opacity:0.2})));
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.1,16,16),new THREE.MeshBasicMaterial({color:0x7b2fff,transparent:true,opacity:0.04,side:THREE.BackSide,blending:THREE.AdditiveBlending})));
    const rg=new THREE.Group();
    [[0x7b2fff,1.35,0],[0x00c3ff,1.48,1.1],[0xff00cc,1.58,2.0]].forEach(([col,r,rx])=>{
      const ring=new THREE.Mesh(new THREE.TorusGeometry(r,0.014,8,80),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending}));
      ring.rotation.x=rx; rg.add(ring);
    }); scene.add(rg);
    const pts=new Float32Array(200*3);
    for(let i=0;i<200;i++){const a=Math.random()*Math.PI*2,r=1.6+Math.random()*0.4;pts[i*3]=Math.cos(a)*r;pts[i*3+1]=(Math.random()-0.5)*1.6;pts[i*3+2]=Math.sin(a)*r;}
    const pGeo=new THREE.BufferGeometry(); pGeo.setAttribute("position",new THREE.BufferAttribute(pts,3));
    scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({size:0.03,color:0x00c3ff,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending})));
    let raf,t=0;
    const animate=()=>{raf=requestAnimationFrame(animate);t+=0.012;core.rotation.x+=0.009;core.rotation.y+=0.013;rg.rotation.y+=0.007;rg.rotation.x+=0.003;core.position.y=Math.sin(t)*0.07;d3.intensity=2.5+Math.sin(t*2)*1.2;renderer.render(scene,camera);};
    animate();
    return()=>{cancelAnimationFrame(raf);renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);};
  },[]);
  return <div ref={ref} style={{width:"100%",height:"100%"}}/>;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEX BADGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function Hex({label,color,bg}){
  const [h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{width:78,height:90,clipPath:"polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)",background:h?`linear-gradient(135deg,${color}33,${bg})`:bg,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .3s",transform:h?"scale(1.12) translateY(-4px)":"scale(1)",boxShadow:h?`0 0 20px ${color}44`:"none"}}>
      <span style={{fontSize:9,fontWeight:700,color,textAlign:"center",letterSpacing:"0.04em",lineHeight:1.2,padding:"0 4px"}}>{label}</span>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAIN COMPONENT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function SpacePortfolio(){
  const mountRef   = useRef(null);
  const sceneRef   = useRef({});
  const [iPhase,   setIPhase]   = useState(0);
  const [introDone,setIntroDone]= useState(false);
  const [activeSection,setActiveSection] = useState(0);
  const [hoveredPlanet,setHoveredPlanet] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const [showPh,setShowPh]=useState(false);
  const searchRef=useRef();

  /* Intro timers */
  useEffect(()=>{
    const T=[];
    T.push(setTimeout(()=>setIPhase(1),350));
    T.push(setTimeout(()=>setIPhase(2),1700));
    T.push(setTimeout(()=>setIPhase(3),2550));
    T.push(setTimeout(()=>setIPhase(4),3900));
    T.push(setTimeout(()=>setIPhase(5),4650));
    T.push(setTimeout(()=>setIPhase(6),5500));
    T.push(setTimeout(()=>{setIPhase(7);setIntroDone(true);},6700));
    return()=>T.forEach(clearTimeout);
  },[]);

  /* Search */
  useEffect(()=>{
    if(searchOpen){setTimeout(()=>searchRef.current?.focus(),420);setTimeout(()=>setShowPh(true),360);}
    else{setShowPh(false);if(searchRef.current)searchRef.current.value="";}
  },[searchOpen]);

  /* Navigate helper */
  const navTo=useCallback((idx)=>{
    if(sceneRef.current) sceneRef.current.targetZ=-idx*12;
    setActiveSection(idx); setMenuOpen(false);
  },[]);

  /* ━━━━ THREE.JS SCENE ━━━━ */
  useEffect(()=>{
    const el=mountRef.current; if(!el) return;
    const W=window.innerWidth, H=window.innerHeight;
    const s=sceneRef.current;

    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
    renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.25;
    el.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x000008);
    scene.fog=new THREE.FogExp2(0x000010,0.016);
    const camera=new THREE.PerspectiveCamera(75,W/H,0.1,1000);
    camera.position.set(0,0,8);

    /* Stars */
    const starCount=8000, starPos=new Float32Array(starCount*3), starCol=new Float32Array(starCount*3);
    for(let i=0;i<starCount;i++){
      starPos[i*3]=(Math.random()-0.5)*400; starPos[i*3+1]=(Math.random()-0.5)*400; starPos[i*3+2]=(Math.random()-0.5)*400;
      const c=new THREE.Color().setHSL(Math.random()*0.15+0.55,0.8,Math.random()*0.4+0.6);
      starCol[i*3]=c.r; starCol[i*3+1]=c.g; starCol[i*3+2]=c.b;
    }
    const starGeo=new THREE.BufferGeometry();
    starGeo.setAttribute("position",new THREE.BufferAttribute(starPos,3));
    starGeo.setAttribute("color",new THREE.BufferAttribute(starCol,3));
    const starMat=new THREE.PointsMaterial({size:0.18,vertexColors:true,transparent:true,opacity:0.9});
    scene.add(new THREE.Points(starGeo,starMat));

    /* Nebula */
    const nebGroup=new THREE.Group();
    [0x4400ff,0x0066ff,0xff0066,0x00ffcc,0x8800ff].forEach((col,n)=>{
      const geo=new THREE.BufferGeometry(), pos=new Float32Array(600*3);
      for(let i=0;i<600;i++){const th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI,r=15+Math.random()*25;pos[i*3]=Math.sin(ph)*Math.cos(th)*r+(Math.random()-0.5)*20;pos[i*3+1]=Math.cos(ph)*r*0.5+(Math.random()-0.5)*15;pos[i*3+2]=Math.sin(ph)*Math.sin(th)*r-n*36;}
      geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
      nebGroup.add(new THREE.Points(geo,new THREE.PointsMaterial({size:1.2,color:col,transparent:true,opacity:0.06,blending:THREE.AdditiveBlending,depthWrite:false})));
    }); scene.add(nebGroup);

    /* Naruto sphere (HOME) */
    const sealTex=buildSealTexture();
    const naruBall=new THREE.Mesh(new THREE.SphereGeometry(2.0,64,64),new THREE.MeshStandardMaterial({map:sealTex,emissiveMap:sealTex,emissive:new THREE.Color(0.5,0.12,0),emissiveIntensity:0.7,metalness:0.35,roughness:0.55}));
    const naruGlow=new THREE.Mesh(new THREE.SphereGeometry(2.28,32,32),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.07,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false}));
    const eGeo=new THREE.BufferGeometry(), ePos=new Float32Array(900*3);
    for(let i=0;i<900;i++){const a=Math.random()*Math.PI*2,r=2.45+Math.random()*0.9;ePos[i*3]=Math.cos(a)*r;ePos[i*3+1]=(Math.random()-0.5)*0.7;ePos[i*3+2]=Math.sin(a)*r;}
    eGeo.setAttribute("position",new THREE.BufferAttribute(ePos,3));
    const eParts=new THREE.Points(eGeo,new THREE.PointsMaterial({size:0.055,color:0xff7700,transparent:true,opacity:0.72,blending:THREE.AdditiveBlending}));
    const tailOrbs=[];
    for(let i=0;i<9;i++){const orb=new THREE.Mesh(new THREE.SphereGeometry(0.09,12,12),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.85,blending:THREE.AdditiveBlending}));orb.userData.baseAngle=(i/9)*Math.PI*2;orb.userData.speed=0.008+Math.random()*0.005;orb.userData.yAmp=0.3+Math.random()*0.35;orb.userData.yFreq=0.6+Math.random()*0.5;tailOrbs.push(orb);}
    const naruGroup=new THREE.Group(); naruGroup.add(naruBall,naruGlow,eParts,...tailOrbs); naruGroup.position.set(0,0,0); scene.add(naruGroup);
    const naruLight=new THREE.PointLight(0xff5500,5,14); scene.add(naruLight);
    s.naruGroup=naruGroup; s.naruBall=naruBall; s.eParts=eParts; s.tailOrbs=tailOrbs; s.naruLight=naruLight;

    /* Helper: glow sphere */
    const makeGlow=(radius,color,emissive,pos,rings=false)=>{
      const g=new THREE.Group();
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(radius,48,48),new THREE.MeshStandardMaterial({color,emissive,emissiveIntensity:0.4,metalness:0.3,roughness:0.6})); mesh.castShadow=true; g.add(mesh);
      g.add(new THREE.Mesh(new THREE.SphereGeometry(radius*1.18,24,24),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.08,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false})));
      if(rings){const r=new THREE.Mesh(new THREE.RingGeometry(radius*1.6,radius*2.4,64),new THREE.MeshBasicMaterial({color,side:THREE.DoubleSide,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending,depthWrite:false}));r.rotation.x=Math.PI*0.35;g.add(r);}
      g.position.set(...pos); return{group:g,mesh};
    };

    /* Planets - 5 extra sections: ABOUT, WORK, SKILLS, VIDEO, CONTACT */
    const aboutP  = makeGlow(1.2,0x00ccaa,0x009977,[-8,  2,-12]);
    const workP   = makeGlow(1.5,0xff6600,0xcc4400,[ 6, -1,-24],true);
    const skillsP = makeGlow(1.1,0x9900ff,0x6600cc,[-5,  3,-36]);
    const videoP  = makeGlow(1.3,0xff69b4,0xcc1177,[ 7,  0,-48],true); // pink video planet
    [aboutP,workP,skillsP,videoP].forEach(p=>scene.add(p.group));

    /* Contact chakra portal - moved to z=-60 */
    const contactGroup=new THREE.Group(); contactGroup.position.set(3,-2,-60);
    const ringDefs=[
      {r1:2.55,r2:0.052,col:0x00c3ff,spd:[0,0,0.010]},
      {r1:2.55,r2:0.052,col:0x7b2fff,spd:[0.012,0,0]},
      {r1:2.55,r2:0.038,col:0x00ffaa,spd:[0.007,0.005,0]},
      {r1:1.80,r2:0.068,col:0xff0066,spd:[0,0.009,0.004]},
      {r1:1.15,r2:0.050,col:0xffcc00,spd:[0.013,0,0.007]},
      {r1:0.70,r2:0.040,col:0x00c3ff,spd:[0,0.016,0]},
    ];
    const cRings=ringDefs.map(({r1,r2,col,spd},idx)=>{
      const m=new THREE.Mesh(new THREE.TorusGeometry(r1,r2,16,100),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.78,blending:THREE.AdditiveBlending,depthWrite:false}));
      m.rotation.x=idx*0.52; m.rotation.y=idx*0.31; m.userData.spd=spd; contactGroup.add(m); return m;
    });
